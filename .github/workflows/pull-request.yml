name: Pull Request CI

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-desktop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0 libsdl2-ttf-2.0-0 libsdl2-image-2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pillow

      - name: Translate source (English)
        run: |
          python tools/translate.py --lang en src build/desktop-en

      - name: Verify translated output
        run: |
          test -f build/desktop-en/main_desktop.py
          echo "Translation OK"

      - name: Headless import test
        shell: bash
        run: |
          cd build/desktop-en
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          python3 << 'PYEOF'
          import os, sys, types

          for mod in ('espnow_manager', 'espnow_handler', 'visit_manager',
                      'sleep_manager', 'wifi_tracker', 'machine'):
              sys.modules[mod] = types.ModuleType(mod)

          import json
          sys.modules['ujson'] = json
          sys.modules['uos']   = os

          import pygame
          pygame.init()

          import config_desktop
          sys.modules['config'] = config_desktop

          import renderer_desktop
          sys.modules['renderer'] = renderer_desktop

          import input_desktop
          sys.modules['input'] = input_desktop

          import framebuf

          from context import GameContext
          from scene_manager import SceneManager
          from weather_system import WeatherSystem
          from time_system import TimeSystem
          from splash import show_splash

          print('All game modules imported successfully')
          pygame.quit()
          PYEOF

      - name: Headless game smoke test (with screenshot)
        shell: bash
        run: |
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          python run.py --lang en --screenshot
          # Verify screenshot was created
          if [ -f build/desktop-en/screenshot.png ]; then
            echo "Screenshot captured: $(file build/desktop-en/screenshot.png)"
          else
            echo "Warning: screenshot not found"
          fi

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: game-screenshot
          path: build/desktop-en/screenshot.png
          if-no-files-found: warn
